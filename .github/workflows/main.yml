local Players = game:GetService("Players")
local ServerStorage = game:GetService("ServerStorage")
local DataStoreService = game:GetService("DataStoreService")

local GunData = DataStoreService:GetDataStore("PermGun_V1")
local TOOL_NAME = "AdminGun"

local function giveGun(player)
    local tool = ServerStorage:FindFirstChild(TOOL_NAME)
    if tool then
        if player.Backpack:FindFirstChild(TOOL_NAME) or (player.Character and player.Character:FindFirstChild(TOOL_NAME)) then
            return false
        end
        local clone = tool:Clone()
        clone.Parent = player.Backpack
        print("Success: Gun given to " .. player.Name)
        return true
    else
        warn("Error: " .. TOOL_NAME .. " not found in ServerStorage!")
        return false
    end
end

Players.PlayerAdded:Connect(function(player)
    local success, hasPerm = pcall(function()
        return GunData:GetAsync(player.UserId)
    end)
    
    if success and hasPerm then
        player.CharacterAdded:Connect(function()
            task.wait(1)
            giveGun(player)
        end)
        if player.Character then giveGun(player) end
    end
    
    player.Chatted:Connect(function(message)
        if player.UserId ~= game.CreatorId then return end
        
        local args = string.split(message, " ")
        if args[1]:lower() == "/e" and args[2] then
            local cmd = args[2]:lower()
            
            if cmd == "get" then
                giveGun(player)
                
            elseif cmd == "perm" and args[3] then
                local targetName = args[3]
                for _, p in pairs(Players:GetPlayers()) do
                    if string.sub(p.Name:lower(), 1, #targetName) == targetName:lower() then
                        pcall(function() GunData:SetAsync(p.UserId, true) end)
                        giveGun(p)
                        break
                    end
                end
                
            elseif cmd == "give" and args[3] then
                local targetName = args[3]
                for _, p in pairs(Players:GetPlayers()) do
                    if string.sub(p.Name:lower(), 1, #targetName) == targetName:lower() then
                        giveGun(p)
                        break
                    end
                end
                
            elseif cmd == "remove" and args[3] then
                local targetName = args[3]
                for _, p in pairs(Players:GetPlayers()) do
                    if string.sub(p.Name:lower(), 1, #targetName) == targetName:lower() then
                        pcall(function() GunData:SetAsync(p.UserId, nil) end)
                        
                        local b1 = p.Backpack:FindFirstChild(TOOL_NAME)
                        if b1 then b1:Destroy() end
                        
                        local b2 = p.Character:FindFirstChild(TOOL_NAME)
                        if b2 then b2:Destroy() end
                        break
                    end
                end
            end
        end
    end)
end)
